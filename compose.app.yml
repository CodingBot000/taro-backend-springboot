name: taro-app

services:
  spring-service:
    build:
      context: .
    image: ${DOCKER_IMAGE_NAME:-core-spring-service:local}
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-postgres}
      PORT: ${PORT:-8080}
      APP_VERSION: ${APP_VERSION:-local-dev}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-10}
      REQUEST_SOURCE_VALIDATION_ENABLED: ${REQUEST_SOURCE_VALIDATION_ENABLED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3100}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-}
      HF_SPACE_URL: ${HF_SPACE_URL:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_API_PREFIX: ${HF_API_PREFIX:-/gradio_api}
      HF_CONNECT_TIMEOUT: ${HF_CONNECT_TIMEOUT:-5s}
      HF_READ_TIMEOUT: ${HF_READ_TIMEOUT:-130s}
      HF_GENERATE_READING_API_NAME: ${HF_GENERATE_READING_API_NAME:-generate_reading}
      HF_BACKEND_VERSION_API_NAME: ${HF_BACKEND_VERSION_API_NAME:-backend_version}
      QUESTION_ANALYSIS_ENABLED: ${QUESTION_ANALYSIS_ENABLED:-false}
      QUESTION_ANALYSIS_PROVIDER: ${QUESTION_ANALYSIS_PROVIDER:-openai}
      QUESTION_ANALYSIS_TIMEOUT: ${QUESTION_ANALYSIS_TIMEOUT:-5s}
      QUESTION_ANALYSIS_OPENAI_BASE_URL: ${QUESTION_ANALYSIS_OPENAI_BASE_URL:-https://api.openai.com}
      QUESTION_ANALYSIS_OPENAI_API_KEY: ${QUESTION_ANALYSIS_OPENAI_API_KEY:-}
      QUESTION_ANALYSIS_OPENAI_MODEL: ${QUESTION_ANALYSIS_OPENAI_MODEL:-}
      JAVA_OPTS: ${JAVA_OPTS:-}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-core}
      DB_USER: ${DB_USER:-core}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_MAX_POOL_SIZE: ${DB_MAX_POOL_SIZE:-5}
      DB_MIN_IDLE: ${DB_MIN_IDLE:-1}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-30000}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      AUTH_ALLOWED_FRONTEND_ORIGINS: ${AUTH_ALLOWED_FRONTEND_ORIGINS:-http://localhost:3000,http://localhost:3100}
      AUTH_OAUTH2_CALLBACK_PATH: ${AUTH_OAUTH2_CALLBACK_PATH:-/auth/callback}
      AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME:-refresh_token}
      AUTH_REFRESH_COOKIE_PATH: ${AUTH_REFRESH_COOKIE_PATH:-/api/auth}
      AUTH_REFRESH_COOKIE_DOMAIN: ${AUTH_REFRESH_COOKIE_DOMAIN:-}
      AUTH_REFRESH_COOKIE_SECURE: ${AUTH_REFRESH_COOKIE_SECURE:-true}
      AUTH_REFRESH_COOKIE_SAME_SITE: ${AUTH_REFRESH_COOKIE_SAME_SITE:-None}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:-1800}
      JWT_REFRESH_TOKEN_EXPIRATION_SECONDS: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:-1209600}
    ports:
      - "127.0.0.1:${HOST_PORT:-8080}:8080"
    networks:
      - app-db-network
    restart: unless-stopped

networks:
  app-db-network:
    external: true
    name: taro-backend-network
