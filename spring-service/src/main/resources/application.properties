spring.application.name=spring-service
server.port=${PORT:8080}

app.version=${APP_VERSION:spring-local}
app.cors-allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://heartsignal.cloud,https://www.heartsignal.cloud,https://taro.heartsignal.cloud}
app.rate-limit.requests-per-minute=${RATE_LIMIT_REQUESTS_PER_MINUTE:10}
app.hugging-face.space-url=${HF_SPACE_URL:}
app.hugging-face.token=${HF_TOKEN:}
app.hugging-face.connect-timeout=5s
app.hugging-face.read-timeout=130s
