services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-core}
      POSTGRES_USER: ${DB_USER:-core}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-core} -d ${DB_NAME:-core}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  spring-service:
    build:
      context: .
    image: ${DOCKER_IMAGE_NAME:-core-spring-service:local}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-postgres}
      PORT: ${PORT:-8080}
      APP_VERSION: ${APP_VERSION:-local-dev}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-10}
      REQUEST_SOURCE_VALIDATION_ENABLED: ${REQUEST_SOURCE_VALIDATION_ENABLED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3100}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-}
      HF_SPACE_URL: ${HF_SPACE_URL:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_API_PREFIX: ${HF_API_PREFIX:-/gradio_api}
      HF_CONNECT_TIMEOUT: ${HF_CONNECT_TIMEOUT:-5s}
      HF_READ_TIMEOUT: ${HF_READ_TIMEOUT:-130s}
      HF_GENERATE_READING_API_NAME: ${HF_GENERATE_READING_API_NAME:-generate_reading}
      HF_BACKEND_VERSION_API_NAME: ${HF_BACKEND_VERSION_API_NAME:-backend_version}
      JAVA_OPTS: ${JAVA_OPTS:-}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-core}
      DB_USER: ${DB_USER:-core}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_MAX_POOL_SIZE: ${DB_MAX_POOL_SIZE:-5}
      DB_MIN_IDLE: ${DB_MIN_IDLE:-1}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-30000}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
    ports:
      - "127.0.0.1:${HOST_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres-data:
